<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Accesible</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Interruptor visual -->
  <div class="form-check form-switch mb-4 text-center">
    <input class="form-check-input" type="checkbox" id="modoDaltonismo" 
           onclick="document.body.classList.toggle('daltonismo')">
    <label class="form-check-label" for="modoDaltonismo"><h1>Modo accesible (daltonismo)</h1></label>
  </div>

  <!-- Formulario -->
  <div class="form-container">
    <h2>Registro de Usuario</h2>
    <form>
      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" required>
      </div>

      <div class="mb-3">
        <label for="apellidos" class="form-label">Apellidos</label>
        <input type="text" class="form-control" id="apellidos" required>
      </div>

      <div class="mb-3">
        <label for="edad" class="form-label">Edad</label>
        <input type="number" class="form-control" id="edad" min="0" required>
      </div>

      <div class="mb-3">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="correo" required>
      </div>

      <div class="mb-3">
        <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
        <input type="date" class="form-control" id="fechaNacimiento" required>
      </div>

      <div class="mb-3">
        <label for="horaEntrada" class="form-label">Hora de entrada</label>
        <input type="time" class="form-control" id="horaEntrada" required>
      </div>

      <div class="mb-3">
        <label for="imagen" class="form-label">Subir imagen</label>
        <input type="file" class="form-control" id="imagen" accept="image/*">
      </div>

      <button type="submit" class="btn btn-primary w-100">Enviar</button>
    </form>
  </div>

</body>
</html>
